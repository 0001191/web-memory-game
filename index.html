<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>3×3 记忆配对小游戏 | 在线翻牌记忆训练</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="一个简单有趣的 3×3 记忆配对小游戏，先记住方块颜色，再翻牌找出所有颜色配对，锻炼瞬间记忆力。"
  />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="3×3 记忆配对小游戏 | 在线翻牌记忆训练" />
  <meta
    property="og:description"
    content="在线 3×3 颜色记忆配对小游戏，先展示全部颜色，再盖住挑战你的瞬间记忆。"
  />
  <meta property="og:image" content="cover.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app" v-cloak>
    <div v-if="screen === 'intro'" class="intro">
      <h1>3×3 记忆配对游戏</h1>
      <div class="hero-image" aria-hidden="true"></div>
      <p class="subtitle">考验你的瞬间记忆力，找到所有颜色配对！</p>
      <button class="primary-btn" @click="startGame">开始游戏</button>
    </div>

    <div v-else class="game-screen">
      <h1>3×3 记忆配对游戏</h1>
      <button class="primary-btn small" @click="restartGame">重新开始</button>
      <div class="grid">
        <div
          v-for="(card, index) in cards"
          :key="card.id"
          class="card"
          :class="{ matched: card.matched, dummy: card.dummy }"
          :style="{ backgroundColor: cardBackground(card) }"
          @click="handleCardClick(index)"
        ></div>
      </div>
    </div>

    <audio ref="bgm" src="bgm.mp3" loop></audio>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="script.js"></script>
</body>
</html>
